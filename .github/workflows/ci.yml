name: web-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore web application
        run: dotnet restore src/TaskManager/TaskManager/TaskManager/TaskManager.csproj

      - name: Build web application
        run: dotnet build src/TaskManager/TaskManager/TaskManager/TaskManager.csproj --configuration Release --no-restore

      - name: Build deployment container
        run: docker build --tag taskmanager:${{ github.sha }} .
